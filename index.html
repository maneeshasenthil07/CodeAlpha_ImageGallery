<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>✨ Nature Explorer Gallery ✨</h1>
    <p class="subtitle">Beautiful moments captured from nature</p>
    <button id="darkMode">🌙 Dark Mode</button>
    <div class="gallery">
        <img src="images/img1.jpg" alt="Image 1" onclick="openLightbox(0)">
        <img src="images/img2.jpg" alt="Image 2" onclick="openLightbox(1)">
        <img src="images/img3.jpg" alt="Image 3" onclick="openLightbox(2)">
        <img src="images/img4.jpg" alt="Image 4" onclick="openLightbox(3)">
        <img src="images/img5.jpg" alt="Image 5" onclick="openLightbox(4)">
        <img src="images/img6.jpg" alt="Image 6" onclick="openLightbox(5)">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <button class="prev" onclick="changeImage(-1)">❮</button>
        <img id="lightbox-img" src="">
        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
